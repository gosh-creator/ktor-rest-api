services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: cities
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      DB_URL: jdbc:postgresql://db:5432/cities
      DB_USER: user
      DB_PASSWORD: password

volumes:
  postgres_data: